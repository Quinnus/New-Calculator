<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
        />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <link href="index.css" rel="stylesheet" />

        <title>Calculator</title>
    </head>
    <body>
        <header></header>
        <main>
            <section class="calculator">
                <div class="all-keys" id="all-keys">
                    <div class="power">
                        <button id="power-button">⏻</button>
                    </div>
                    <div class="display-area">
                        <div class="lcd-burn">888888888888</div>
                        <div class="lcd-real" id="lcd-real"></div>
                    </div>
                    <div class="operator" id="plus">
                        <button>+</button>
                    </div>
                    <div class="operator" id="minus">
                        <button>-</button>
                    </div>
                    <div class="operator" id="multiply">
                        <button>*</button>
                    </div>
                    <div class="operator" id="divide">
                        <button>÷</button>
                    </div>
                    <div class="digit" id="1">
                        <button id="div7">1</button>
                    </div>
                    <div class="digit" id="2">
                        <button id="div8">2</button>
                    </div>
                    <div class="digit" id="3">
                        <button id="div9">3</button>
                    </div>
                    <div class="digit" id="4">
                        <button id="div10">4</button>
                    </div>
                    <div class="digit" id="5">
                        <button id="div11">5</button>
                    </div>
                    <div class="digit" id="6">
                        <button id="div12">6</button>
                    </div>
                    <div class="digit" id="7">
                        <button id="div13">7</button>
                    </div>
                    <div class="digit" id="8">
                        <button id="div14">8</button>
                    </div>
                    <div class="digit" id="9">
                        <button id="div15">9</button>
                    </div>
                    <div class="clear-screen">
                        <button id="clear">C</button>
                    </div>
                    <div class="digit" id="0">
                        <button id="div17">0</button>
                    </div>
                    <div class="decimal-point">
                        <button id="decimal">.</button>
                    </div>
                    <div class="equals-button">
                        <button id="equals">=</button>
                    </div>
                </div>
            </section>
        </main>
        <script src="index.js" defer></script>
    </body>
</html>
